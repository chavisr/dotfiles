#import:
#- ~/.config/alacritty/themes/themes/taerminal.yaml

env:
  TERM: xterm-256color

font:
  size: 8

hints:
  enabled:
  - regex: "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\0-\x1F\x7F-\x9F<>\"\\s{-}\\^⟨⟩`]+"
    hyperlinks: true
    command: xdg-open
    mouse:
      enabled: true
      mods: Control

selection:
  save_to_clipboard: false

window:
  opacity: 0.9
