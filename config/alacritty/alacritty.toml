# import = ["~/.config/alacritty/themes/themes/alacritty_0_12.toml"]

[env]
TERM = "xterm-256color"

[font]
size = 8

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.mouse]
enabled = true
mods = "Control"

[selection]
save_to_clipboard = false

[window]
opacity = 0.45
