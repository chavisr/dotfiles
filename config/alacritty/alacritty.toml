
[env]
TERM = "xterm-256color"

[font]
size = 12
[font.normal]
family = "JetBrains Mono Nerd Font"

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
regex = "(mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.mouse]
enabled = true
mods = "Control"

[selection]
save_to_clipboard = false

[window]
opacity = 0.85
dynamic_padding = true

#[window.padding]
#x = 4
#y = 4

[general]
import = ["~/.config/alacritty/themes/themes/gruvbox_material_medium_dark.toml"]
